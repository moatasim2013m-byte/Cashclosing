name: Deploy to Cloud Run

# Builds the container and deploys it to the `peekaboo-app` Cloud Run service.
# Live URL: https://peekaboo-app-757490984314.us-central1.run.app/

on:
  push:
    branches:
      - main
      - claude/github-cloud-run-deploy-dnpz18
  workflow_dispatch:

env:
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'peekaboo-app' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Required for Workload Identity Federation authentication.
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Authenticate to Google Cloud.
      # Preferred: Workload Identity Federation (set GCP_WORKLOAD_IDENTITY_PROVIDER
      # and GCP_SERVICE_ACCOUNT). Fallback: a service-account JSON key (GCP_SA_KEY).
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${CLOUD_RUN_SERVICE}" \
            --source . \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${GCP_REGION}" \
            --port 8080 \
            --allow-unauthenticated \
            --quiet

      - name: Show service URL
        run: |
          gcloud run services describe "${CLOUD_RUN_SERVICE}" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${GCP_REGION}" \
            --format 'value(status.url)'
